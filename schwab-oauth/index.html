<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="format-detection" content="telephone=no">
  <meta name="referrer" content="no-referrer">
  <title>Second Brain</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
      background: #000;
      color: #fff;
      -webkit-font-smoothing: antialiased;
    }
    @media (prefers-color-scheme: light) {
      html, body { background: #f5f5f7; color: #1d1d1f; }
      .subtitle, .hint { color: rgba(0,0,0,0.55); }
      .spinner { border-color: rgba(0,0,0,0.15); border-top-color: #1d1d1f; }
      .button { background: #1d1d1f; color: #fff; }
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      text-align: center;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 2.5px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 24px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .title {
      font-size: 22px;
      font-weight: 600;
      margin: 0 0 8px;
      letter-spacing: -0.02em;
    }
    .subtitle {
      font-size: 16px;
      color: rgba(255,255,255,0.6);
      margin: 0 0 8px;
      max-width: 320px;
      line-height: 1.4;
    }
    .fallback {
      display: none;
      margin-top: 32px;
      max-width: 320px;
    }
    .fallback.visible { display: block; }
    .button {
      display: inline-block;
      padding: 12px 28px;
      background: #fff;
      color: #000;
      text-decoration: none;
      border-radius: 999px;
      font-weight: 600;
      font-size: 16px;
      margin-top: 16px;
    }
    .hint {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      margin-top: 24px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="spinner" aria-hidden="true"></div>
  <h1 class="title">Opening Second Brain&hellip;</h1>
  <p class="subtitle">Finishing your Schwab connection.</p>

  <div class="fallback" id="fallback" role="status">
    <p class="subtitle">If the app didn't open, tap below to retry.</p>
    <a href="#" id="retry" class="button">Open in Second Brain</a>
    <p class="hint">Still not working? Return to the Second Brain app and tap "Connect Schwab" again — the connection step is fast.</p>
  </div>

  <script>
    // The Universal Link should fire before this page even renders. If it
    // doesn't (rare: AASA cache miss, app uninstalled, Safari long-press),
    // show the fallback after a short delay and offer a self-reload retry.
    setTimeout(function () {
      document.getElementById('fallback').classList.add('visible');
    }, 2500);

    document.getElementById('retry').addEventListener('click', function (e) {
      e.preventDefault();
      window.location.href = window.location.href;
    });
  </script>
</body>
</html>
