<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="format-detection" content="telephone=no">
  <meta name="referrer" content="no-referrer">
  <title>Second Brain</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
      background: #000; color: #fff;
      -webkit-font-smoothing: antialiased;
    }
    @media (prefers-color-scheme: light) {
      html, body { background: #f5f5f7; color: #1d1d1f; }
      .subtitle, .hint { color: rgba(0,0,0,0.55); }
      .spinner { border-color: rgba(0,0,0,0.15); border-top-color: #1d1d1f; }
      .button { background: #1d1d1f; color: #fff; }
    }
    body {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100vh; padding: 24px; text-align: center;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 2.5px solid rgba(255,255,255,0.2);
      border-top-color: #fff; border-radius: 50%;
      animation: spin 0.8s linear infinite; margin-bottom: 24px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .title { font-size: 22px; font-weight: 600; margin: 0 0 8px; letter-spacing: -0.02em; }
    .subtitle { font-size: 16px; color: rgba(255,255,255,0.6); margin: 0 0 8px; max-width: 320px; line-height: 1.4; }
    .fallback { display: none; margin-top: 32px; max-width: 320px; }
    .fallback.visible { display: block; }
    .button {
      display: inline-block; padding: 12px 28px;
      background: #fff; color: #000; text-decoration: none;
      border-radius: 999px; font-weight: 600; font-size: 16px; margin-top: 16px;
    }
    .hint { font-size: 13px; color: rgba(255,255,255,0.5); margin-top: 24px; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="spinner" aria-hidden="true"></div>
  <h1 class="title">Opening Second Brain&hellip;</h1>
  <p class="subtitle">Finishing your Schwab connection.</p>

  <div class="fallback" id="fallback" role="status">
    <p class="subtitle">If the app didn't open automatically, tap below.</p>
    <a href="#" id="retry" class="button">Open in Second Brain</a>
    <p class="hint">If that doesn't work either, return to the Second Brain app and tap "Connect Schwab" again.</p>
  </div>

  <script>
    // Build a custom-URL-scheme link from the auth code Schwab passed
    // in the query string. iOS will prompt "Open in Second Brain?"
    // when the user taps it — the app's .onOpenURL handler picks up
    // the code+state and finishes the OAuth exchange.
    (function () {
      var params = new URLSearchParams(window.location.search);
      var code = params.get('code');
      var state = params.get('state');
      var retry = document.getElementById('retry');
      if (code && state && retry) {
        retry.href = 'secondbrainschwab://oauth-redirect?code=' +
          encodeURIComponent(code) + '&state=' + encodeURIComponent(state);
      } else if (retry) {
        // No code in URL — likely a manual visit. Hide the retry button.
        retry.style.display = 'none';
      }
      // Show the fallback after 2.5s. If the Universal Link fired
      // correctly, the app already took over and this never renders.
      setTimeout(function () {
        document.getElementById('fallback').classList.add('visible');
      }, 2500);
    })();
  </script>
</body>
</html>
